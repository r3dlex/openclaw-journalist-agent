services:
  # ── Long-running scheduler service ──────────────────────────────
  # Runs pipelines on the cron schedule defined in spec/CRON.md.
  # Start:  docker compose up -d scheduler
  # Logs:   docker compose logs -f scheduler
  # Stop:   docker compose down scheduler
  # Ad-hoc: docker compose exec scheduler pipeline news
  #         docker compose exec scheduler pipeline article <url>
  scheduler:
    build:
      context: ./tools
      target: production
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - JOURNALIST_DATA_DIR=/app
      # Use Europe/Berlin so schedule library times match CRON.md times
      - TZ=Europe/Berlin
      # Use host.docker.internal to reach IAMQ on the Docker host (Mac/Windows)
      - IAMQ_HTTP_URL=http://host.docker.internal:18790
      # Mounted path for librarian workspace (container-internal path)
      - LIBRARIAN_WORKSPACE_MOUNT=/app/librarian_workspace
    volumes:
      - journalist_config:/app/config:ro
      - journalist_logs:/app/log:rw
      - journalist_reports:/app/reports:rw
      # Mount librarian workspace so handoff step can write signals
      - ${LIBRARIAN_AGENT_WORKSPACE:-.}:/app/librarian_workspace:rw
    working_dir: /app
    # Use the Dockerfile ENTRYPOINT (python -m pipeline_runner.cli) + scheduler arg
    command: ["scheduler"]
    restart: unless-stopped
    stop_grace_period: 30s

  # ── One-shot pipeline commands ──────────────────────────────────
  # Use when the scheduler is NOT running, or in CI:
  #   docker compose run --rm pipeline news
  #   docker compose run --rm pipeline article <url>
  #   docker compose run --rm pipeline weather 6am
  #   docker compose run --rm pipeline validate
  pipeline:
    build:
      context: ./tools
      target: production
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - JOURNALIST_DATA_DIR=/app
    volumes:
      - journalist_config:/app/config:ro
      - journalist_logs:/app/log:rw
      - journalist_reports:/app/reports:rw
    working_dir: /app
    profiles: ["cli"]

  # ── Test runner ─────────────────────────────────────────────────
  #   docker compose run --rm pipeline-test
  pipeline-test:
    build:
      context: ./tools
      target: test
    env_file: .env
    volumes:
      - journalist_config:/app/config:ro
    working_dir: /app
    profiles: ["test"]

  # ── Legacy scripts (pre-pipeline) ──────────────────────────────
  #   docker compose run --rm journalist python scripts/fetch_news.py
  journalist:
    build: .
    env_file: .env
    volumes:
      - ./scripts:/app/scripts:ro
      - journalist_config:/app/config:ro
      - journalist_logs:/app/log:rw
      - journalist_reports:/app/reports:rw
    working_dir: /app
    profiles: ["legacy"]

  # ── IAMQ sidecar — inter-agent messaging (Elixir/OTP, zero-install) ──
  iamq:
    image: openclaw-iamq-sidecar:latest
    restart: unless-stopped
    environment:
      IAMQ_HTTP_URL: http://host.docker.internal:18790
      IAMQ_WS_URL: ws://host.docker.internal:18793/ws
      IAMQ_AGENT_ID: journalist_agent
      IAMQ_AGENT_NAME: Journalist
      IAMQ_AGENT_EMOJI: "\U0001F4F0"
      IAMQ_AGENT_DESC: "News gathering, article extraction, weather briefings, and content pipeline"
      IAMQ_AGENT_CAPABILITIES: article_extraction,news_briefing,weather_briefing,content_pipeline,research,web_crawl,summarize,rss_monitor
      IAMQ_HEARTBEAT_MS: "300000"
      IAMQ_POLL_MS: "60000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  journalist_config:
  journalist_logs:
  journalist_reports:
